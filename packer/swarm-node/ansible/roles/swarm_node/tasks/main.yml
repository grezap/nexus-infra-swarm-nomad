---
# swarm_node role -- install Docker CE, Nomad, Consul, the firstboot script,
# and systemd units. Runs after the four nexus_* shared roles inside the
# swarm-node Packer template.

# ─── Docker CE ────────────────────────────────────────────────────────────
- name: Install prerequisites for Docker apt repo
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Create /etc/apt/keyrings (modern apt key location)
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Download Docker GPG key
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://download.docker.com/linux/debian/gpg \
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod 644 /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Detect Debian codename
  ansible.builtin.command: lsb_release -cs
  register: swarm_node_debian_codename
  changed_when: false

- name: Add Docker apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ swarm_node_debian_codename.stdout }} {{ swarm_node_docker_channel }}\n"
    owner: root
    group: root
    mode: '0644'

- name: Install Docker CE + plugins
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Add nexusadmin to docker group (operator can run docker without sudo)
  ansible.builtin.user:
    name: "{{ target_user }}"
    groups: docker
    append: true

- name: Disable docker.service at template stage (firstboot enables after NIC config)
  ansible.builtin.systemd:
    name: docker.service
    enabled: false
    state: stopped

# ─── HashiCorp Consul ─────────────────────────────────────────────────────
- name: Create consul group
  ansible.builtin.group:
    name: "{{ swarm_node_consul_group }}"
    system: true
    state: present

- name: Create consul user
  ansible.builtin.user:
    name: "{{ swarm_node_consul_user }}"
    group: "{{ swarm_node_consul_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: /opt/consul
    create_home: false
    state: present

- name: Create Consul directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: /opt/consul, owner: "{{ swarm_node_consul_user }}", group: "{{ swarm_node_consul_group }}", mode: '0750' }
    - { path: "{{ swarm_node_consul_data_dir }}", owner: "{{ swarm_node_consul_user }}", group: "{{ swarm_node_consul_group }}", mode: '0700' }
    - { path: "{{ swarm_node_consul_config_dir }}", owner: root, group: "{{ swarm_node_consul_group }}", mode: '0750' }

- name: Download + verify + install Consul binary
  ansible.builtin.shell: |
    set -euo pipefail
    cd /tmp
    zip="consul_{{ swarm_node_consul_version }}_{{ swarm_node_hashicorp_arch }}.zip"
    sums="consul_{{ swarm_node_consul_version }}_SHA256SUMS"
    curl -fsSL "https://releases.hashicorp.com/consul/{{ swarm_node_consul_version }}/${zip}"  -o "${zip}"
    curl -fsSL "https://releases.hashicorp.com/consul/{{ swarm_node_consul_version }}/${sums}" -o "${sums}"
    grep "${zip}" "${sums}" | sha256sum -c -
    unzip -o "${zip}"
    install -m 755 -o root -g root consul /usr/local/bin/consul
    rm -f "${zip}" "${sums}" consul
  args:
    creates: /usr/local/bin/consul

# ─── HashiCorp Nomad ──────────────────────────────────────────────────────
- name: Create nomad group
  ansible.builtin.group:
    name: "{{ swarm_node_nomad_group }}"
    system: true
    state: present

- name: Create nomad user
  ansible.builtin.user:
    name: "{{ swarm_node_nomad_user }}"
    group: "{{ swarm_node_nomad_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: /opt/nomad
    create_home: false
    state: present

- name: Create Nomad directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: /opt/nomad, owner: "{{ swarm_node_nomad_user }}", group: "{{ swarm_node_nomad_group }}", mode: '0750' }
    # Nomad client mode needs to operate as root (containerd integration, cgroup mgmt).
    # Server-mode dirs are still owned by nomad user; client config will run nomad as root via systemd unit override at firstboot.
    - { path: "{{ swarm_node_nomad_data_dir }}", owner: "{{ swarm_node_nomad_user }}", group: "{{ swarm_node_nomad_group }}", mode: '0700' }
    - { path: "{{ swarm_node_nomad_config_dir }}", owner: root, group: "{{ swarm_node_nomad_group }}", mode: '0750' }

- name: Download + verify + install Nomad binary
  ansible.builtin.shell: |
    set -euo pipefail
    cd /tmp
    zip="nomad_{{ swarm_node_nomad_version }}_{{ swarm_node_hashicorp_arch }}.zip"
    sums="nomad_{{ swarm_node_nomad_version }}_SHA256SUMS"
    curl -fsSL "https://releases.hashicorp.com/nomad/{{ swarm_node_nomad_version }}/${zip}"  -o "${zip}"
    curl -fsSL "https://releases.hashicorp.com/nomad/{{ swarm_node_nomad_version }}/${sums}" -o "${sums}"
    grep "${zip}" "${sums}" | sha256sum -c -
    unzip -o "${zip}"
    install -m 755 -o root -g root nomad /usr/local/bin/nomad
    rm -f "${zip}" "${sums}" nomad
  args:
    creates: /usr/local/bin/nomad

- name: Set IPC_LOCK + NET_BIND_SERVICE capabilities on Nomad binary
  ansible.builtin.command: setcap "cap_ipc_lock,cap_net_bind_service=+ep" /usr/local/bin/nomad
  changed_when: false

# ─── Config templates (rendered by firstboot in server vs client mode) ────
- name: Install consul.hcl server-mode template
  ansible.builtin.template:
    src: consul-server.hcl.j2
    dest: "{{ swarm_node_consul_config_dir }}/consul-server.hcl.tpl"
    owner: root
    group: "{{ swarm_node_consul_group }}"
    mode: '0640'

- name: Install consul.hcl client-mode template
  ansible.builtin.template:
    src: consul-client.hcl.j2
    dest: "{{ swarm_node_consul_config_dir }}/consul-client.hcl.tpl"
    owner: root
    group: "{{ swarm_node_consul_group }}"
    mode: '0640'

- name: Install nomad.hcl server-mode template
  ansible.builtin.template:
    src: nomad-server.hcl.j2
    dest: "{{ swarm_node_nomad_config_dir }}/nomad-server.hcl.tpl"
    owner: root
    group: "{{ swarm_node_nomad_group }}"
    mode: '0640'

- name: Install nomad.hcl client-mode template
  ansible.builtin.template:
    src: nomad-client.hcl.j2
    dest: "{{ swarm_node_nomad_config_dir }}/nomad-client.hcl.tpl"
    owner: root
    group: "{{ swarm_node_nomad_group }}"
    mode: '0640'

# ─── Systemd units ────────────────────────────────────────────────────────
- name: Install consul.service systemd unit
  ansible.builtin.template:
    src: consul.service.j2
    dest: /etc/systemd/system/consul.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd

- name: Install nomad.service systemd unit
  ansible.builtin.template:
    src: nomad.service.j2
    dest: /etc/systemd/system/nomad.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd

# ─── Firstboot ────────────────────────────────────────────────────────────
- name: Install swarm-node-firstboot.sh
  ansible.builtin.copy:
    src: swarm-node-firstboot.sh
    dest: /usr/local/sbin/swarm-node-firstboot.sh
    owner: root
    group: root
    mode: '0755'

- name: Install swarm-node-firstboot.service systemd unit
  ansible.builtin.template:
    src: swarm-node-firstboot.service.j2
    dest: /etc/systemd/system/swarm-node-firstboot.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd

- name: Enable swarm-node-firstboot service (runs once on first clone boot)
  ansible.builtin.systemd:
    name: swarm-node-firstboot.service
    enabled: true
    daemon_reload: true

# Consul/Nomad/Docker are enabled BY firstboot (after config rendering),
# not at template time -- the template has no IP/role yet.

- name: Verify Docker version
  ansible.builtin.command: /usr/bin/docker --version
  changed_when: false
  register: swarm_node_docker_version_out

- name: Verify Nomad version
  ansible.builtin.command: /usr/local/bin/nomad version
  changed_when: false
  register: swarm_node_nomad_version_out

- name: Verify Consul version
  ansible.builtin.command: /usr/local/bin/consul version
  changed_when: false
  register: swarm_node_consul_version_out

- name: Show installed versions
  ansible.builtin.debug:
    msg:
      - "Docker:  {{ swarm_node_docker_version_out.stdout }}"
      - "Nomad:   {{ swarm_node_nomad_version_out.stdout_lines[0] }}"
      - "Consul:  {{ swarm_node_consul_version_out.stdout_lines[0] }}"
