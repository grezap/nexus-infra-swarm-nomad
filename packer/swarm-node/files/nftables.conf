#!/usr/sbin/nft -f
#
# swarm-node — nftables ruleset (Phase 0.E.1)
#
# Builds on the deb13 baseline (deny-all-inbound, allow SSH +
# node_exporter from VMnet11) and adds the swarm-node role's
# cluster-backplane + operator-UI rules.
#
# At clone time the primary NIC is `nic0` (VMnet11 service) and the
# secondary NIC is `nic1` (VMnet10 cluster backplane), set up by
# swarm-node-firstboot.sh post-clone.

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        iif "lo" accept
        ct state { established, related } accept
        ct state invalid drop

        # ICMP — let everything ping (debug-friendly in a lab)
        ip protocol icmp   accept
        ip6 nexthdr icmpv6 accept

        # Management from the lab network only
        iifname "nic0" ip saddr 192.168.70.0/24 tcp dport 22   accept comment "SSH from VMnet11"
        iifname "nic0" ip saddr 192.168.70.0/24 tcp dport 9100 accept comment "node_exporter from VMnet11"

        # Phase 0.E.1 — swarm-node role: trust the VMnet10 cluster backplane.
        # Cluster-internal traffic (Docker Swarm 2377/7946/4789,
        # Consul 8300-8600, Nomad 4646-4648) is too many ports to enumerate
        # cleanly, and the canonical pattern is "the cluster backplane is
        # trusted." nic1 only carries 192.168.10.0/24 traffic; the saddr
        # restriction prevents cross-network leak via misconfigured routing.
        iifname "nic1" ip saddr 192.168.10.0/24 accept comment "trusted cluster backplane (VMnet10)"

        # Phase 0.E.1 — operator UIs reachable from the build host (VMnet11).
        # 8500 is the original Consul HTTP UI port; after 0.E.2.2 hard-cut to
        # HTTPS-only, 8500 stays in the rule (harmless when no listener) and
        # 8501 takes over for actual operator access. Nomad UI on 4646.
        # Portainer (0.E.4) will add 9999.
        iifname "nic0" ip saddr 192.168.70.0/24 tcp dport { 8500, 8501, 4646 } accept comment "Consul (HTTP+HTTPS) + Nomad UIs from VMnet11"

        counter drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
